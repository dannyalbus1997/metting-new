version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: sumsy-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: sumsy

  # Redis (optional, for queues)
  redis:
    image: redis:7-alpine
    container_name: sumsy-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sumsy-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    depends_on:
      - mongodb
      - redis
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/sumsy
      REDIS_HOST: redis
      REDIS_PORT: 6379

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sumsy-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000

volumes:
  mongodb_data:
  redis_data:
